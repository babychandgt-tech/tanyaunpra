kind = "web"
previewPath = "/"
title = "Tanya UNPRA Admin Dashboard"
version = "1.0.0"
id = "artifacts/tanya-unpra-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22966

[services.development]
run = "pnpm --filter @workspace/tanya-unpra-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tanya-unpra-dashboard", "run", "build" ]
publicDir = "artifacts/tanya-unpra-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22966"
BASE_PATH = "/"
