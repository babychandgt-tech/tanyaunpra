openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API Sistem Informasi Akademik Tanya UNPRA
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health check
  - name: auth
    description: Authentication & RBAC

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login user (semua role)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login berhasil — mengembalikan access token + refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Email atau password salah
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/refresh:
    post:
      operationId: refreshToken
      tags: [auth]
      summary: Perbarui access token menggunakan refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: Token berhasil diperbarui
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Refresh token tidak valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Registrasi mahasiswa atau dosen baru
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registrasi berhasil
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Data tidak valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email sudah terdaftar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Profil user yang sedang login (semua role terautentikasi)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Profil user
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/UserProfile"
                required: [user]
        "401":
          description: Token tidak valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/api-keys:
    get:
      operationId: listApiKeys
      tags: [auth]
      summary: List semua API keys (admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Daftar API key
          content:
            application/json:
              schema:
                type: object
                properties:
                  apiKeys:
                    type: array
                    items:
                      $ref: "#/components/schemas/ApiKey"
                required: [apiKeys]
        "403":
          description: Akses ditolak
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createApiKey
      tags: [auth]
      summary: Generate API key baru untuk Android app (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApiKeyRequest"
      responses:
        "201":
          description: API key berhasil dibuat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateApiKeyResponse"
        "403":
          description: Akses ditolak
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/api-keys/{id}:
    delete:
      operationId: revokeApiKey
      tags: [auth]
      summary: Nonaktifkan API key (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: API key berhasil dinonaktifkan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "403":
          description: Akses ditolak
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ping/admin:
    get:
      operationId: pingAdmin
      tags: [auth]
      summary: Ping endpoint — admin only (demo RBAC)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Hanya admin yang bisa akses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PingResponse"
        "403":
          description: Akses ditolak
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ping/dosen:
    get:
      operationId: pingDosen
      tags: [auth]
      summary: Ping endpoint — dosen + admin (demo RBAC)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dosen dan admin bisa akses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PingResponse"
        "403":
          description: Akses ditolak
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ping/mahasiswa:
    get:
      operationId: pingMahasiswa
      tags: [auth]
      summary: Ping endpoint — semua role terautentikasi (demo RBAC)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Semua role bisa akses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PingResponse"
        "401":
          description: Tidak terautentikasi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    PingResponse:
      type: object
      properties:
        message:
          type: string
        role:
          type: string
          enum: [mahasiswa, dosen, admin]
      required: [message, role]

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
      required: [email, password]

    RefreshTokenRequest:
      type: object
      properties:
        refreshToken:
          type: string
      required: [refreshToken]

    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        name:
          type: string
        role:
          type: string
          enum: [mahasiswa, dosen]
        nim:
          type: string
          description: Wajib jika role mahasiswa
        nidn:
          type: string
          description: Wajib jika role dosen
        prodi:
          type: string
        fakultas:
          type: string
        angkatan:
          type: integer
          description: Tahun angkatan (mahasiswa)
      required: [email, password, name, role, prodi, fakultas]

    UserProfile:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [mahasiswa, dosen, admin]
        name:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, email, role, name, createdAt]

    AuthResponse:
      type: object
      properties:
        token:
          type: string
          description: Access token (berlaku 1 hari)
        refreshToken:
          type: string
          description: Refresh token (berlaku 30 hari)
        user:
          $ref: "#/components/schemas/UserProfile"
      required: [token, refreshToken, user]

    ApiKey:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        keyPrefix:
          type: string
        isActive:
          type: boolean
        lastUsedAt:
          type: string
          format: date-time
          nullable: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, name, keyPrefix, isActive, createdAt]

    CreateApiKeyRequest:
      type: object
      properties:
        name:
          type: string
          description: Nama deskriptif untuk API key ini
        expiresInDays:
          type: integer
          nullable: true
          description: Masa berlaku dalam hari. Null berarti tidak kadaluarsa.
      required: [name]

    CreateApiKeyResponse:
      type: object
      properties:
        apiKey:
          allOf:
            - $ref: "#/components/schemas/ApiKey"
            - type: object
              properties:
                key:
                  type: string
                  description: "Full API key — hanya ditampilkan sekali saat dibuat"
              required: [key]
        message:
          type: string
      required: [apiKey, message]
