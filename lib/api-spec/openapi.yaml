  /auth/api-keys/{id}:
    delete:
      operationId: revokeApiKey
      tags: [auth]
      summary: Nonaktifkan API key (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: API key berhasil dinonaktifkan
          content:
