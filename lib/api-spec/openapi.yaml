components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    PingResponse:
      type: object
      properties:
        message:
          type: string
        role:
          type: string
          enum: [mahasiswa, dosen, admin]
      required: [message, role]

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
          description: Password (minimal 6 karakter untuk login; registrasi memerlukan minimal 8)
      required: [email, password]

    RefreshTokenRequest:
      type: object
      properties:
        refreshToken:
          type: string
      required: [refreshToken]

    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          description: Password minimal 8 karakter
        name:
          type: string
        role:
          type: string
          enum: [mahasiswa, dosen]
        nim:
          type: string
          description: Wajib jika role mahasiswa
        nidn:
          type: string
          description: Wajib jika role dosen
        prodi:
          type: string
        fakultas:
          type: string
        angkatan:
          type: integer
          description: Tahun angkatan (mahasiswa)
      required: [email, password, name, role, prodi, fakultas]

    UserProfile:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [mahasiswa, dosen, admin]
        name:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, email, role, name, createdAt]

    AuthResponse:
      type: object
      properties:
        token:
          type: string
          description: Access token (berlaku 1 hari)
        refreshToken:
          type: string
          description: Refresh token (berlaku 30 hari)
        user:
          $ref: "#/components/schemas/UserProfile"
      required: [token, refreshToken, user]

    ApiKey:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        keyPrefix:
          type: string
        isActive:
          type: boolean
        lastUsedAt:
          type: string
          format: date-time
          nullable: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, name, keyPrefix, isActive, createdAt]

    CreateApiKeyRequest:
      type: object
      properties:
        name:
          type: string
          description: Nama deskriptif untuk API key ini
        expiresInDays:
          type: integer
          minimum: 1
          maximum: 365
          description: Masa berlaku dalam hari (1-365). Jika tidak diisi, key tidak kadaluarsa.
      required: [name]

    CreateApiKeyResponse:
      type: object
      properties:
        apiKey:
          allOf:
            - $ref: "#/components/schemas/ApiKey"
            - type: object
              properties:
                key:
                  type: string
                  description: "Full API key — hanya ditampilkan sekali saat dibuat"
              required: [key]
        message:
          type: string
      required: [apiKey, message]

    ChatAskRequest:
      type: object
      properties:
        question:
          type: string
          minLength: 1
          maxLength: 2000
          description: Pertanyaan dari pengguna
        sessionId:
          type: string
          description: ID sesi percakapan yang sudah ada (opsional)
        deviceInfo:
          type: string
          maxLength: 255
          description: Informasi perangkat Android (opsional)
      required: [question]

    ChatAskResponse:
      type: object
      properties:
        answer:
          type: string
          description: Jawaban dari AI atau intent database
        sessionId:
          type: string
          description: ID sesi percakapan (baru atau yang sudah ada)
        source:
          type: string
          enum: [intent, ai, fallback]
          description: Sumber jawaban
        confidence:
          type: number
          description: Skor kepercayaan jawaban (0.0 - 1.0)
        needsReview:
          type: boolean
          description: Apakah jawaban memerlukan review manual
      required: [answer, sessionId, source, confidence, needsReview]

    ChatSession:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
          nullable: true
        deviceInfo:
          type: string
          nullable: true
        lastMessageAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        messageCount:
          type: integer
      required: [id, lastMessageAt, createdAt, messageCount]

    ChatMessage:
      type: object
      properties:
        id:
          type: string
        sessionId:
          type: string
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        answerSource:
          type: string
          enum: [intent, ai, fallback]
          nullable: true
        confidence:
          type: number
          nullable: true
        needsReview:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, sessionId, role, content, needsReview, createdAt]

    ChatSessionsResponse:
      type: object
      properties:
        sessions:
          type: array
          items:
            $ref: "#/components/schemas/ChatSession"
        pagination:
          $ref: "#/components/schemas/Pagination"
      required: [sessions, pagination]

    ChatSessionDetailResponse:
      type: object
      properties:
        session:
          $ref: "#/components/schemas/ChatSession"
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
      required: [session, messages]

    ChatStatsResponse:
      type: object
      properties:
        today:
          type: object
          properties:
            sessions:
              type: integer
            messages:
              type: integer
          required: [sessions, messages]
        week:
          type: object
          properties:
            sessions:
              type: integer
          required: [sessions]
        needsReview:
          type: integer
        sourceBreakdown:
          type: object
          additionalProperties:
            type: integer
        popularTopics:
          type: array
          description: Pertanyaan paling sering diajukan minggu ini (top 10)
          items:
            type: object
            properties:
              question:
                type: string
              count:
                type: integer
            required: [question, count]
        lowConfidenceSessions:
          type: array
          items:
            type: object
            properties:
              sessionId:
                type: string
              avgConfidence:
                type: number
            required: [sessionId, avgConfidence]
      required: [today, week, needsReview, sourceBreakdown, popularTopics, lowConfidenceSessions]

    Intent:
      type: object
      properties:
        id:
          type: string
        pertanyaan:
          type: string
        jawaban:
          type: string
        kategori:
          type: string
        keywords:
          type: array
          items:
            type: string
          nullable: true
        confidence:
          type: number
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, pertanyaan, jawaban, kategori, confidence, isActive, createdAt, updatedAt]

    IntentResponse:
      type: object
      properties:
        intent:
          $ref: "#/components/schemas/Intent"
      required: [intent]

    IntentsResponse:
      type: object
      properties:
        intents:
          type: array
          items:
            $ref: "#/components/schemas/Intent"
        pagination:
          $ref: "#/components/schemas/Pagination"
      required: [intents, pagination]

    CreateIntentRequest:
      type: object
      properties:
        pertanyaan:
          type: string
          minLength: 5
          maxLength: 500
        jawaban:
          type: string
          minLength: 10
          maxLength: 2000
        kategori:
          type: string
          default: "Umum"
        keywords:
          type: array
          items:
            type: string
        confidence:
          type: number
          minimum: 0
          maximum: 1
