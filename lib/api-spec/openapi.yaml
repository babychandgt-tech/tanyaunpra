openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API Sistem Informasi Akademik Tanya UNPRA
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health check
  - name: auth
    description: Authentication & RBAC
  - name: chat
    description: Chat AI & sesi percakapan
  - name: intents
    description: Manajemen intent/FAQ database

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login user (semua role)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login berhasil — mengembalikan access token + refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Email atau password salah
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/refresh:
    post:
      operationId: refreshToken
      tags: [auth]
      summary: Perbarui access token menggunakan refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: Token berhasil diperbarui
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Refresh token tidak valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Registrasi mahasiswa atau dosen baru
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registrasi berhasil
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Data tidak valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email sudah terdaftar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Profil user yang sedang login (semua role terautentikasi)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Profil user
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/UserProfile"
                required: [user]
        "401":
          description: Token tidak valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/api-keys:
    get:
      operationId: listApiKeys
      tags: [auth]
      summary: List semua API keys (admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Daftar API key
          content:
            application/json:
              schema:
                type: object
                properties:
                  apiKeys:
                    type: array
                    items:
                      $ref: "#/components/schemas/ApiKey"
                required: [apiKeys]
        "403":
          description: Akses ditolak
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createApiKey
      tags: [auth]
      summary: Generate API key baru untuk Android app (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApiKeyRequest"
      responses:
        "201":
          description: API key berhasil dibuat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateApiKeyResponse"
        "403":
          description: Akses ditolak
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/api-keys/{id}:
    delete:
      operationId: revokeApiKey
      tags: [auth]
      summary: Nonaktifkan API key (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: API key berhasil dinonaktifkan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "403":
          description: Akses ditolak
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ping/admin:
    get:
      operationId: pingAdmin
      tags: [auth]
      summary: Ping endpoint — admin only (demo RBAC)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Hanya admin yang bisa akses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PingResponse"
        "403":
          description: Akses ditolak
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ping/dosen:
    get:
      operationId: pingDosen
      tags: [auth]
      summary: Ping endpoint — dosen + admin (demo RBAC)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dosen dan admin bisa akses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PingResponse"
        "403":
          description: Akses ditolak
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ping/mahasiswa:
    get:
      operationId: pingMahasiswa
      tags: [auth]
      summary: Ping endpoint — semua role terautentikasi (demo RBAC)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Semua role bisa akses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PingResponse"
        "401":
          description: Tidak terautentikasi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chat/ask:
    post:
      operationId: chatAsk
      tags: [chat]
      summary: Kirim pertanyaan ke AI asisten UNPRA (Android — API key auth)
      security:
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatAskRequest"
      responses:
        "200":
          description: Jawaban dari AI atau intent database
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatAskResponse"
        "400":
          description: Data tidak valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: API key tidak valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chat/sessions:
    get:
      operationId: listChatSessions
      tags: [chat]
      summary: List semua sesi percakapan (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: date
          in: query
          schema:
            type: string
            format: date
          description: Filter berdasarkan tanggal (YYYY-MM-DD)
      responses:
        "200":
          description: Daftar sesi percakapan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatSessionsResponse"
        "403":
          description: Akses ditolak
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chat/sessions/{id}:
    get:
      operationId: getChatSession
      tags: [chat]
      summary: Detail sesi percakapan beserta semua pesan (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Detail sesi dan pesan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatSessionDetailResponse"
        "404":
          description: Session tidak ditemukan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chat/messages/{id}/flag:
    patch:
      operationId: flagChatMessage
      tags: [chat]
      summary: Tandai pesan untuk review manual (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                needsReview:
                  type: boolean
              required: [needsReview]
      responses:
        "200":
          description: Status review diperbarui
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "403":
          description: Akses ditolak
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chat/stats:
    get:
      operationId: getChatStats
      tags: [chat]
      summary: Statistik chat — total sesi, sumber jawaban, confidence rendah (admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Statistik chat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatStatsResponse"
        "403":
          description: Akses ditolak
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /intents:
    get:
      operationId: listIntents
      tags: [intents]
      summary: List intent/FAQ database (admin & dosen)
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: kategori
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: isActive
          in: query
          schema:
            type: string
            enum: ["true", "false"]
      responses:
        "200":
          description: Daftar intent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntentsResponse"
        "403":
          description: Akses ditolak
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createIntent
      tags: [intents]
      summary: Tambah intent/FAQ baru (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIntentRequest"
      responses:
        "201":
          description: Intent berhasil dibuat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntentResponse"
        "400":
          description: Data tidak valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /intents/{id}:
    get:
      operationId: getIntent
      tags: [intents]
      summary: Detail intent (admin & dosen)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Detail intent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntentResponse"
        "404":
          description: Intent tidak ditemukan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateIntent
      tags: [intents]
      summary: Update intent/FAQ (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateIntentRequest"
      responses:
        "200":
          description: Intent berhasil diperbarui
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntentResponse"
        "404":
          description: Intent tidak ditemukan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteIntent
      tags: [intents]
      summary: Hapus intent (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Intent berhasil dihapus
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          description: Intent tidak ditemukan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    PingResponse:
      type: object
      properties:
        message:
          type: string
        role:
          type: string
          enum: [mahasiswa, dosen, admin]
      required: [message, role]

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
          description: Password (minimal 6 karakter untuk login; registrasi memerlukan minimal 8)
      required: [email, password]

    RefreshTokenRequest:
      type: object
      properties:
        refreshToken:
          type: string
      required: [refreshToken]

    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          description: Password minimal 8 karakter
        name:
          type: string
        role:
          type: string
          enum: [mahasiswa, dosen]
        nim:
          type: string
          description: Wajib jika role mahasiswa
        nidn:
          type: string
          description: Wajib jika role dosen
        prodi:
          type: string
        fakultas:
          type: string
        angkatan:
          type: integer
          description: Tahun angkatan (mahasiswa)
      required: [email, password, name, role, prodi, fakultas]

    UserProfile:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [mahasiswa, dosen, admin]
        name:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, email, role, name, createdAt]

    AuthResponse:
      type: object
      properties:
        token:
          type: string
          description: Access token (berlaku 1 hari)
        refreshToken:
          type: string
          description: Refresh token (berlaku 30 hari)
        user:
          $ref: "#/components/schemas/UserProfile"
      required: [token, refreshToken, user]

    ApiKey:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        keyPrefix:
          type: string
        isActive:
          type: boolean
        lastUsedAt:
          type: string
          format: date-time
          nullable: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, name, keyPrefix, isActive, createdAt]

    CreateApiKeyRequest:
      type: object
      properties:
        name:
          type: string
          description: Nama deskriptif untuk API key ini
        expiresInDays:
          type: integer
          minimum: 1
          maximum: 365
          description: Masa berlaku dalam hari (1-365). Jika tidak diisi, key tidak kadaluarsa.
      required: [name]

    CreateApiKeyResponse:
      type: object
      properties:
        apiKey:
          allOf:
            - $ref: "#/components/schemas/ApiKey"
            - type: object
              properties:
                key:
                  type: string
                  description: "Full API key — hanya ditampilkan sekali saat dibuat"
              required: [key]
        message:
          type: string
      required: [apiKey, message]

    ChatAskRequest:
      type: object
      properties:
        question:
          type: string
          minLength: 1
          maxLength: 2000
          description: Pertanyaan dari pengguna
        sessionId:
          type: string
          description: ID sesi percakapan yang sudah ada (opsional)
        deviceInfo:
          type: string
          maxLength: 255
          description: Informasi perangkat Android (opsional)
      required: [question]

    ChatAskResponse:
      type: object
      properties:
        answer:
          type: string
          description: Jawaban dari AI atau intent database
        sessionId:
          type: string
          description: ID sesi percakapan (baru atau yang sudah ada)
        source:
          type: string
          enum: [intent, ai, fallback]
          description: Sumber jawaban
        confidence:
          type: number
          description: Skor kepercayaan jawaban (0.0 - 1.0)
        needsReview:
          type: boolean
          description: Apakah jawaban memerlukan review manual
      required: [answer, sessionId, source, confidence, needsReview]

    ChatSession:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
          nullable: true
        deviceInfo:
          type: string
          nullable: true
        lastMessageAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        messageCount:
          type: integer
      required: [id, lastMessageAt, createdAt, messageCount]

    ChatMessage:
      type: object
      properties:
        id:
          type: string
        sessionId:
          type: string
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        answerSource:
          type: string
          enum: [intent, ai, fallback]
          nullable: true
        confidence:
          type: number
          nullable: true
        needsReview:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, sessionId, role, content, needsReview, createdAt]

    ChatSessionsResponse:
      type: object
      properties:
        sessions:
          type: array
          items:
            $ref: "#/components/schemas/ChatSession"
        pagination:
          $ref: "#/components/schemas/Pagination"
      required: [sessions, pagination]

    ChatSessionDetailResponse:
      type: object
      properties:
        session:
          $ref: "#/components/schemas/ChatSession"
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
      required: [session, messages]

    ChatStatsResponse:
      type: object
      properties:
        today:
          type: object
          properties:
            sessions:
              type: integer
            messages:
              type: integer
          required: [sessions, messages]
        week:
          type: object
          properties:
            sessions:
              type: integer
          required: [sessions]
        needsReview:
          type: integer
        sourceBreakdown:
          type: object
          additionalProperties:
            type: integer
        lowConfidenceSessions:
          type: array
          items:
            type: object
            properties:
              sessionId:
                type: string
              avgConfidence:
                type: number
            required: [sessionId, avgConfidence]
      required: [today, week, needsReview, sourceBreakdown, lowConfidenceSessions]

    Intent:
      type: object
      properties:
        id:
          type: string
        pertanyaan:
          type: string
        jawaban:
          type: string
        kategori:
          type: string
        keywords:
          type: array
          items:
            type: string
          nullable: true
        confidence:
          type: number
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, pertanyaan, jawaban, kategori, confidence, isActive, createdAt, updatedAt]

    IntentResponse:
      type: object
      properties:
        intent:
          $ref: "#/components/schemas/Intent"
      required: [intent]

    IntentsResponse:
      type: object
      properties:
        intents:
          type: array
          items:
            $ref: "#/components/schemas/Intent"
        pagination:
          $ref: "#/components/schemas/Pagination"
      required: [intents, pagination]

    CreateIntentRequest:
      type: object
      properties:
        pertanyaan:
          type: string
          minLength: 5
          maxLength: 500
        jawaban:
          type: string
          minLength: 10
          maxLength: 2000
        kategori:
          type: string
          default: "Umum"
        keywords:
          type: array
          items:
            type: string
        confidence:
          type: number
          minimum: 0
          maximum: 1
          default: 1.0
        isActive:
          type: boolean
          default: true
      required: [pertanyaan, jawaban]

    UpdateIntentRequest:
      type: object
      properties:
        pertanyaan:
          type: string
          minLength: 5
          maxLength: 500
        jawaban:
          type: string
          minLength: 10
          maxLength: 2000
        kategori:
          type: string
        keywords:
          type: array
          items:
            type: string
        confidence:
          type: number
          minimum: 0
          maximum: 1
        isActive:
          type: boolean

    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer
      required: [page, limit, total, totalPages]
