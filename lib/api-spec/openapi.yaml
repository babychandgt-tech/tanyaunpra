openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API Sistem Informasi Akademik Tanya UNPRA
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health check
  - name: auth
    description: Authentication & RBAC
  - name: chat
    description: Chat AI & sesi percakapan
  - name: intents
    description: Manajemen intent/FAQ database
  - name: courses
    description: Manajemen mata kuliah
  - name: schedules
    description: Jadwal kuliah
  - name: lecturers
    description: Data dosen
  - name: students
    description: Data mahasiswa
  - name: announcements
    description: Pengumuman kampus
  - name: academic-calendar
    description: Kalender akademik
  - name: dashboard
    description: Statistik & aktivitas dashboard admin

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login user (semua role)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login berhasil — mengembalikan access token + refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Email atau password salah
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/refresh:
    post:
      operationId: refreshToken
      tags: [auth]
      summary: Perbarui access token menggunakan refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: Token berhasil diperbarui
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Refresh token tidak valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Registrasi mahasiswa atau dosen baru
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registrasi berhasil
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Data tidak valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email sudah terdaftar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Profil user yang sedang login (semua role terautentikasi)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Profil user
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/UserProfile"
                required: [user]
        "401":
          description: Token tidak valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/api-keys:
    get:
      operationId: listApiKeys
      tags: [auth]
      summary: List semua API keys (admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Daftar API key
          content:
            application/json:
              schema:
                type: object
                properties:
                  apiKeys:
                    type: array
                    items:
                      $ref: "#/components/schemas/ApiKey"
                required: [apiKeys]
        "403":
          description: Akses ditolak
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createApiKey
      tags: [auth]
      summary: Generate API key baru untuk Android app (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApiKeyRequest"
      responses:
        "201":
          description: API key berhasil dibuat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateApiKeyResponse"
        "403":
          description: Akses ditolak
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/api-keys/{id}:
    delete:
      operationId: revokeApiKey
      tags: [auth]
      summary: Nonaktifkan API key (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: API key berhasil dinonaktifkan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "403":
          description: Akses ditolak
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ping/admin:
    get:
      operationId: pingAdmin
      tags: [auth]
      summary: Ping endpoint — admin only (demo RBAC)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Hanya admin yang bisa akses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PingResponse"
        "403":
          description: Akses ditolak
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ping/dosen:
    get:
      operationId: pingDosen
      tags: [auth]
      summary: Ping endpoint — dosen + admin (demo RBAC)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dosen dan admin bisa akses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PingResponse"
        "403":
          description: Akses ditolak
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ping/mahasiswa:
    get:
      operationId: pingMahasiswa
      tags: [auth]
      summary: Ping endpoint — semua role terautentikasi (demo RBAC)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Semua role bisa akses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PingResponse"
        "401":
          description: Tidak terautentikasi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chat/ask:
    post:
      operationId: chatAsk
      tags: [chat]
      summary: Kirim pertanyaan ke AI asisten UNPRA (Android — API key auth)
      security:
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatAskRequest"
      responses:
        "200":
          description: Jawaban dari AI atau intent database
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatAskResponse"
        "400":
          description: Data tidak valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: API key tidak valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chat/sessions:
    get:
      operationId: listChatSessions
      tags: [chat]
      summary: List semua sesi percakapan (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: date
          in: query
          schema:
            type: string
            format: date
          description: Filter berdasarkan tanggal (YYYY-MM-DD)
        - name: search
          in: query
          schema:
            type: string
          description: Filter berdasarkan device info pengguna
      responses:
        "200":
          description: Daftar sesi percakapan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatSessionsResponse"
        "403":
          description: Akses ditolak
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chat/sessions/{id}:
    get:
      operationId: getChatSession
      tags: [chat]
      summary: Detail sesi percakapan beserta semua pesan (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Detail sesi dan pesan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatSessionDetailResponse"
        "404":
          description: Session tidak ditemukan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chat/messages/{id}/flag:
    patch:
      operationId: flagChatMessage
      tags: [chat]
      summary: Tandai pesan untuk review manual (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                needsReview:
                  type: boolean
              required: [needsReview]
      responses:
        "200":
          description: Status review diperbarui
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "403":
          description: Akses ditolak
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chat/stats:
    get:
      operationId: getChatStats
      tags: [chat]
      summary: Statistik chat — total sesi, sumber jawaban, confidence rendah (admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Statistik chat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatStatsResponse"
        "403":
          description: Akses ditolak
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /intents:
    get:
      operationId: listIntents
      tags: [intents]
      summary: List intent/FAQ database (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: kategori
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: isActive
          in: query
          schema:
            type: string
            enum: ["true", "false"]
      responses:
        "200":
          description: Daftar intent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntentsResponse"
        "403":
          description: Akses ditolak
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createIntent
      tags: [intents]
      summary: Tambah intent/FAQ baru (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIntentRequest"
      responses:
        "201":
          description: Intent berhasil dibuat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntentResponse"
        "400":
          description: Data tidak valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /intents/{id}:
    get:
      operationId: getIntent
      tags: [intents]
      summary: Detail intent (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Detail intent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntentResponse"
        "404":
          description: Intent tidak ditemukan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateIntent
      tags: [intents]
      summary: Update intent/FAQ (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateIntentRequest"
      responses:
        "200":
          description: Intent berhasil diperbarui
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntentResponse"
        "404":
          description: Intent tidak ditemukan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteIntent
      tags: [intents]
      summary: Hapus intent (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Intent berhasil dihapus
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          description: Intent tidak ditemukan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /courses:
    get:
      operationId: listCourses
      tags: [courses]
      summary: List mata kuliah (semua role)
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: prodi
          in: query
          schema: { type: string }
        - name: semester
          in: query
          schema: { type: integer }
        - name: search
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Daftar mata kuliah
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoursesResponse"
        "401":
          description: Tidak terautentikasi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createCourse
      tags: [courses]
      summary: Tambah mata kuliah baru (admin & dosen)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCourseRequest"
      responses:
        "201":
          description: Mata kuliah berhasil dibuat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseResponse"
        "400":
          description: Data tidak valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Akses ditolak
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Kode mata kuliah sudah digunakan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /courses/{id}:
    get:
      operationId: getCourse
      tags: [courses]
      summary: Detail mata kuliah (semua role)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Detail mata kuliah
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseResponse"
        "404":
          description: Mata kuliah tidak ditemukan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateCourse
      tags: [courses]
      summary: Update mata kuliah (admin & dosen)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCourseRequest"
      responses:
        "200":
          description: Mata kuliah berhasil diperbarui
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseResponse"
        "404":
          description: Mata kuliah tidak ditemukan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteCourse
      tags: [courses]
      summary: Hapus mata kuliah (admin & dosen)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Mata kuliah berhasil dihapus
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          description: Mata kuliah tidak ditemukan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /schedules:
    get:
      operationId: listSchedules
      tags: [schedules]
      summary: List jadwal kuliah (semua role)
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: prodi
          in: query
          schema: { type: string }
        - name: semester
          in: query
          schema: { type: string }
        - name: tahunAjaran
          in: query
          schema: { type: string }
        - name: lecturerId
          in: query
          schema: { type: string }
        - name: courseId
          in: query
          schema: { type: string }
        - name: hari
          in: query
          schema:
            type: string
            enum: [Senin, Selasa, Rabu, Kamis, Jumat, Sabtu]
      responses:
        "200":
          description: Daftar jadwal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchedulesResponse"
    post:
      operationId: createSchedule
      tags: [schedules]
      summary: Tambah jadwal kuliah (admin & dosen)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScheduleRequest"
      responses:
        "201":
          description: Jadwal berhasil dibuat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleResponse"
        "400":
          description: Data tidak valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /schedules/{id}:
    get:
      operationId: getSchedule
      tags: [schedules]
      summary: Detail jadwal kuliah (semua role)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Detail jadwal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleResponse"
        "404":
          description: Jadwal tidak ditemukan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateSchedule
      tags: [schedules]
      summary: Update jadwal kuliah (admin & dosen)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateScheduleRequest"
      responses:
        "200":
          description: Jadwal berhasil diperbarui
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleResponse"
        "404":
          description: Jadwal tidak ditemukan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteSchedule
      tags: [schedules]
      summary: Hapus jadwal kuliah (admin & dosen)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Jadwal berhasil dihapus
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          description: Jadwal tidak ditemukan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /lecturers:
    get:
      operationId: listLecturers
      tags: [lecturers]
      summary: List dosen (semua role)
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: prodi
          in: query
          schema: { type: string }
        - name: fakultas
          in: query
          schema: { type: string }
        - name: search
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Daftar dosen
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LecturersResponse"
    post:
      operationId: createLecturer
      tags: [lecturers]
      summary: Tambah data dosen baru (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLecturerRequest"
      responses:
        "201":
          description: Data dosen berhasil dibuat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LecturerResponse"
        "400":
          description: Data tidak valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Akses ditolak
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: NIDN sudah terdaftar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /lecturers/{id}:
    get:
      operationId: getLecturer
      tags: [lecturers]
      summary: Detail data dosen (semua role)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Detail dosen
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LecturerResponse"
        "404":
          description: Dosen tidak ditemukan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateLecturer
      tags: [lecturers]
      summary: Update data dosen (dosen edit sendiri, admin edit semua)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLecturerRequest"
      responses:
        "200":
          description: Data dosen berhasil diperbarui
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LecturerResponse"
        "403":
          description: Dosen hanya bisa edit profil sendiri
